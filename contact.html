  <section class="contact">
    <div class="contact-content">
      <h1>Contact Me</h1>
      <p>If you’d like to get in touch, send me a message below or reach out on my socials.</p>
      <br>


<form action="https://api.web3forms.com/submit" method="POST" id="contact-form">
  <input type="hidden" name="access_key" value="3b6bd53c-315f-4d5c-8884-ce7bad619a59">
  <!-- Optional: redirect to a specific success page, or just let Web3Forms show its default "Thank you" page -->
  <!-- <input type="hidden" name="redirect" value="https://web3forms.com/success"> -->

  <fieldset>
    <legend>Send a Message</legend>

    <div class="form-row">
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" name="firstName" required placeholder="First Name" />
      </div>
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="lastName" required placeholder="Last Name" />
      </div>
    </div>

    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required placeholder="Email Address" />

    <label for="phone">Phone Number <span class="optional">(optional)</span></label>
    <input type="tel" id="phone" name="phone" placeholder="e.g. +1 415 000 0000" />

    <label for="message">Message</label>
    <textarea id="message" name="message" required placeholder="Write your message here..."></textarea>

    <button type="submit">Send Message</button>
  </fieldset>
</form>

</div>

</div>

</section>

<script>
    const menuIcon = document.getElementById('menu-icon');

        menuIcon.classList.toggle('bx-menu');
        menuIcon.classList.toggle('bx-x');

</script>
